name: Manual Docker Push

on: 
  workflow_dispatch: # No attributes needed, just a button

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # This automatically pulls the branch you selected in the UI

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Make sure to update 'my-app-name' to your desired Docker Hub repo name
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app-name:latest
